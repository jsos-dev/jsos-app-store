name: Process App Registration

on:
  issues:
    types: [labeled]

jobs:
  register:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'approved'
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Parse issue form
        id: parse
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/register-app.yml

      - name: Validate and create PR
        uses: actions/github-script@v7
        with:
          script: |
            const { owner: repoOwner, repo: repoName } = context.repo;
            const issueNumber = context.issue.number;

            async function reject(reason) {
              await github.rest.issues.createComment({
                owner: repoOwner, repo: repoName,
                issue_number: issueNumber,
                body: `❌ **Rejected**: ${reason}`
              });
              await github.rest.issues.removeLabel({
                owner: repoOwner, repo: repoName,
                issue_number: issueNumber, name: 'approved'
              });
              await github.rest.issues.addLabels({
                owner: repoOwner, repo: repoName,
                issue_number: issueNumber, labels: ['rejected']
              });
            }

            // --- Parse payload ---
            let payload;
            try {
              payload = JSON.parse(`${{ steps.parse.outputs.payload }}`);
            } catch (e) {
              console.log('Raw payload:', `${{ steps.parse.outputs.payload }}`);
              await reject('Failed to parse issue form data.');
              return;
            }

            console.log('Parsed payload:', JSON.stringify(payload, null, 2));

            // --- Extract fields ---
            const appId = String(payload['app-id'] || '').trim();
            const appName = String(payload['app-name'] || '').trim();
            const appDesc = String(payload['app-desc'] || '').trim();
            const repoUrl = String(payload['app-repo'] || '').trim();
            const category = String(payload['app-category'] || '').trim();
            const tagsRaw = String(payload['app-tags'] || '').trim();
            const tags = tagsRaw
              ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean)
              : [];

            console.log('Extracted:', { appId, appName, appDesc, repoUrl, category });

            // --- Validate required fields ---
            if (!appId || !appName || !appDesc || !repoUrl || !category) {
              const missing = [];
              if (!appId) missing.push('App ID');
              if (!appName) missing.push('App Name');
              if (!appDesc) missing.push('Description');
              if (!repoUrl) missing.push('GitHub Repository');
              if (!category) missing.push('Category');
              await reject(`Missing required fields: ${missing.join(', ')}`);
              return;
            }

            // --- Validate app ID format ---
            if (!/^[a-z0-9]+(\.[a-z0-9]+){2,}$/.test(appId)) {
              await reject(
                `Invalid App ID format: \`${appId}\`\n\n` +
                'Format must be: `domain.category.name` (lowercase, dots as separators)\n\n' +
                'Examples:\n' +
                '- `dev.tool.markdown-editor`\n' +
                '- `com.game.tetris`\n' +
                '- `org.util.file-manager`'
              );
              return;
            }

            // --- Parse repo URL ---
            const repoMatch = repoUrl.match(/github\.com\/([^/]+)\/([^/]+)/);
            if (!repoMatch) {
              await reject(
                'Invalid GitHub repository URL.\n\n' +
                'Please use format: `https://github.com/owner/repo`'
              );
              return;
            }
            const [, githubOwner, githubRepo] = repoMatch;

            // --- Check ID uniqueness ---
            try {
              const existing = await github.rest.repos.getContent({
                owner: repoOwner, repo: repoName,
                path: `apps/${appId}.json`
              });
              if (existing.data) {
                await reject(`App ID \`${appId}\` already exists. Please choose a different ID.`);
                return;
              }
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            // --- Validate repo exists ---
            let repoInfo;
            try {
              repoInfo = await github.rest.repos.get({ owner: githubOwner, repo: githubRepo });
            } catch {
              await reject(`Repository \`${githubOwner}/${githubRepo}\` not found or not accessible.`);
              return;
            }

            // --- Validate repo has package.json with jsos config ---
            try {
              const pkgFile = await github.rest.repos.getContent({
                owner: githubOwner, repo: githubRepo,
                path: 'package.json'
              });
              const pkgContent = Buffer.from(pkgFile.data.content, 'base64').toString('utf-8');
              const pkg = JSON.parse(pkgContent);
              if (!pkg.jsos || !pkg.jsos.id || !pkg.jsos.startCommand) {
                await reject(
                  'Repository does not contain a valid JSOS app.\n\n' +
                  'package.json must have a `jsos` field with `id` and `startCommand`.'
                );
                return;
              }
            } catch (e) {
              if (e.status === 404) {
                await reject('Repository does not contain a package.json file.');
                return;
              }
              console.log(`Warning: Could not read package.json: ${e.message}`);
            }

            // --- Build app.json manifest ---
            const appManifest = {
              id: appId,
              name: appName,
              description: appDesc,
              repository: { owner: githubOwner, repo: githubRepo },
              category,
              ...(tags.length > 0 && { tags })
            };

            // --- Create branch, commit file, open PR ---
            const branchName = `register/${appId}`;

            const mainRef = await github.rest.git.getRef({
              owner: repoOwner, repo: repoName,
              ref: 'heads/main'
            });

            await github.rest.git.createRef({
              owner: repoOwner, repo: repoName,
              ref: `refs/heads/${branchName}`,
              sha: mainRef.data.object.sha
            });

            const fileContent = Buffer.from(
              JSON.stringify(appManifest, null, 2) + '\n'
            ).toString('base64');

            await github.rest.repos.createOrUpdateFileContents({
              owner: repoOwner, repo: repoName,
              path: `apps/${appId}.json`,
              message: `Register app: ${appName}`,
              content: fileContent,
              branch: branchName
            });

            const prBody = [
              `Registers **${appName}** to the JSOS App Store.`,
              '',
              '## App Info',
              `- **App ID**: \`${appId}\``,
              `- **Repository**: \`${githubOwner}/${githubRepo}\``,
              `- **Category**: ${category}`,
              ...(tags.length > 0 ? [`- **Tags**: ${tags.join(', ')}`] : []),
              '',
              '---',
              `Closes #${issueNumber}`
            ].join('\n');

            const pr = await github.rest.pulls.create({
              owner: repoOwner, repo: repoName,
              title: `[App] ${appName}`,
              body: prBody,
              head: branchName,
              base: 'main'
            });

            // --- Update issue ---
            await github.rest.issues.createComment({
              owner: repoOwner, repo: repoName,
              issue_number: issueNumber,
              body: `✅ **Approved** — PR created: ${pr.data.html_url}\n\nA maintainer will review the PR before merging.`
            });

            await github.rest.issues.update({
              owner: repoOwner, repo: repoName,
              issue_number: issueNumber,
              state: 'closed'
            });
